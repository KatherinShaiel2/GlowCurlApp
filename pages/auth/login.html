<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="../../css/style.css">

</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>Glow Curl App</h1>

<p>Bienvenido</p>

<input
type="text"
id="usuario"
placeholder="Usuario">

<input
type="password"
id="password"
placeholder="Contraseña">

<select id="rol">

<option value="">
Seleccione acceso
</option>

<option value="cliente">
Cliente
</option>

<option value="empresa">
Empresa
</option>

</select>

<br><br>

<div class="mostrar-pass">

<input
type="checkbox"
id="verPassword"
onclick="mostrarPassword()">

<label for="verPassword">

Mostrar contraseña

</label>

</div>

<br><br>

<button onclick="ingresar()">

Iniciar sesión

</button>

<button onclick="limpiarLogin()">

Limpiar

</button>

</div>

</div>

<script src="../../js/app.js"></script>

</body>

</html>
