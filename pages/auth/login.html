<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login</title>

<link rel="stylesheet" href="../../css/style.css">
</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>Glow Curl App</h1>

<p>Bienvenido</p>

<!-- USUARIO -->
<input type="text" id="usuario" placeholder="Usuario o correo">

<!-- CONTRASEÑA -->
<input type="password" id="password" placeholder="Contraseña">

<!-- ROL -->
<select id="rol">
<option value="">Seleccione acceso</option>
<option value="cliente">Cliente</option>
<option value="empresa">Empresa</option>
</select>

<!-- MOSTRAR CONTRASEÑA -->
<div class="mostrar-pass">
<input type="checkbox" id="verPassword" onclick="mostrarPassword()">
<label for="verPassword">Mostrar contraseña</label>
</div>

<!-- BOTÓN LOGIN -->
<button onclick="ingresar()">Iniciar sesión</button>

<!-- LIMPIAR -->
<button onclick="limpiarLogin()">Limpiar</button>

<br><br>

<p>
¿No tienes cuenta?
<a href="registroCliente.html">Registrarse</a>
</p>

</div>

</div>

<!-- JS -->
<script src="../../js/app.js"></script>

</body>
</html>
