<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Registro</title>

<link rel="stylesheet"
href="../../css/style.css">

</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>Crear cuenta</h1>

<p>Regístrate en Glow Curl</p>

<input
type="text"
id="nombre"
placeholder="Nombre">

<input
type="text"
id="apellido"
placeholder="Apellido">

<input
type="email"
id="correo"
placeholder="Correo">

<input
type="text"
id="telefono"
placeholder="Teléfono">

<select id="cabello">

<option value="">
Tipo de cabello
</option>

<option>
Ondulado
</option>

<option>
Rizado
</option>

<option>
Afro
</option>

</select>

<input
type="password"
id="password"
placeholder="Contraseña">

<input
type="password"
id="confirmar"
placeholder="Confirmar contraseña">

<button
onclick="registrar()">

Registrarse

</button>

<br><br>

<p>

¿Ya tienes cuenta?

<a href="login.html">

Iniciar sesión

</a>

</p>

</div>

</div>

<script src="../../js/registro.js"></script>

</body>

</html>
