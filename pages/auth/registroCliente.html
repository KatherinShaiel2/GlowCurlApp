<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1">

<title>Registro Cliente</title>

<link rel="stylesheet"
href="../../css/style.css">

</head>

<body>

<div class="login-container">

<div class="login-box">

<h1>

Glow Curl App

</h1>

<p>

Crear cuenta

</p>

<input
type="text"
id="nombre"
placeholder="Nombre">

<input
type="text"
id="apellido"
placeholder="Apellido">

<input
type="email"
id="correo"
placeholder="Correo">

<input
type="text"
id="telefono"
placeholder="Teléfono">

<select id="cabello">

<option value="">

Tipo de cabello

</option>

<option>

Ondulado

</option>

<option>

Rizado

</option>

<option>

Afro

</option>

</select>

<input
type="password"
id="password"
placeholder="Contraseña">

<input
type="password"
id="confirmar"
placeholder="Confirmar contraseña">

<button
onclick="registrarCliente()">

Registrarse

</button>

<br><br>

<p>

¿Ya tienes cuenta?

<a href="loginCliente.html">

Iniciar sesión

</a>

</p>

</div>

</div>

<script src="../../js/clientes.js"></script>

</body>

</html>
