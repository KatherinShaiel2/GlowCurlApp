<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Login Empresa</title>

<link rel="stylesheet"
href="../../css/style.css">

</head>

<body>
    <a href="../../index.html" class="btn-inicio">
    🏠 Inicio
</a>

<div class="login-container">

<div class="login-box">

<h1>Glow Curl Empresa</h1>

<p>Acceso empresa</p>

<input
type="text"
id="usuarioEmpresa"
placeholder="Usuario">

<input
type="password"
id="passwordEmpresa"
placeholder="Contraseña">

<div class="mostrar-pass">

<input
type="checkbox"
onclick="mostrarPasswordEmpresa()">

<label>

Mostrar contraseña

</label>

</div>

<button
onclick="ingresarEmpresa()">

Ingresar

</button>

<button
onclick="limpiarEmpresa()">

Limpiar

</button>

</div>

</div>

<script src="../../js/app.js"></script>

</body>

</html>
<button class="btn-volver" onclick="window.location.href='../../index.html'">
← Volver al inicio
</button>
