<div class="contenido">

<h1>Inventario</h1>

<div class="formulario">

<input
type="text"
id="codigoInventario"
placeholder="Código"
oninput="soloNumeros(this)">

<input
type="text"
id="productoInventario"
placeholder="Producto">

<input
type="text"
id="stockInventario"
placeholder="Stock"
oninput="soloNumeros(this)">

<input
type="text"
id="minimoInventario"
placeholder="Stock mínimo"
oninput="soloNumeros(this)">

<select id="estadoInventario">

<option value="">
Estado
</option>

<option>Disponible</option>
<option>Bajo stock</option>
<option>Agotado</option>

</select>

</div>


<div class="botones">

<button onclick="guardarInventario()">
Guardar
</button>

<button onclick="editarInventario()">
Editar
</button>

<button onclick="eliminarInventario()">
Eliminar
</button>

<button onclick="limpiarInventario()">
Limpiar
</button>

</div>


<div class="tabla-container">

<table id="tablaInventario">

<thead>

<tr>

<th>Código</th>
<th>Producto</th>
<th>Stock</th>
<th>Mínimo</th>
<th>Estado</th>

</tr>

</thead>

<tbody>

</tbody>

</table>
