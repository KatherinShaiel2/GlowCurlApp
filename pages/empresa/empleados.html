<div class="contenido">

<h1>Empleados</h1>

<div class="formulario">

<input
type="text"
id="documentoEmpleado"
placeholder="Documento"
oninput="soloNumeros(this)">

<input
type="text"
id="nombreEmpleado"
placeholder="Nombre"
oninput="soloLetras(this)">

<input
type="text"
id="apellidoEmpleado"
placeholder="Apellido"
oninput="soloLetras(this)">

<input
type="text"
id="telefonoEmpleado"
placeholder="Teléfono"
oninput="soloNumeros(this)">

<input
type="email"
id="correoEmpleado"
placeholder="Correo">

<select id="cargoEmpleado">

<option value="">
Seleccione cargo
</option>

<option>Administrador</option>
<option>Estilista</option>
<option>Recepcionista</option>

</select>

</div>


<div class="botones">

<button onclick="guardarEmpleado()">
Guardar
</button>

<button onclick="editarEmpleado()">
Editar
</button>

<button onclick="eliminarEmpleado()">
Eliminar
</button>

<button onclick="limpiarEmpleado()">
Limpiar
</button>

</div>


<div class="tabla-container">

<table id="tablaEmpleados">

<thead>

<tr>

<th>Documento</th>
<th>Nombre</th>
<th>Apellido</th>
<th>Teléfono</th>
<th>Cargo</th>

</tr>

</thead>

<tbody>

</tbody>

</table>
