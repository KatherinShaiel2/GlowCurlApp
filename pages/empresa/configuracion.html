<h1>

⚙ Configuración

</h1>

<p>

Administra la información de Glow Curl App

</p>

<br>


<h2>

🏢 Información empresa

</h2>

<div class="formulario">

<input
type="text"
id="empresa"
placeholder="Nombre empresa">


<input
type="email"
id="correo"
placeholder="Correo empresa">


<input
type="text"
id="telefono"
placeholder="Teléfono">


<input
type="text"
id="direccion"
placeholder="Dirección">

</div>


<br>


<h2>

🕒 Horario

</h2>

<div class="formulario">

<input
type="time"
id="horaInicio">

<input
type="time"
id="horaFin">

</div>


<br>


<h2>

🎨 Apariencia

</h2>

<div class="formulario">

<select id="tema">

<option value="normal">

Color actual

</option>

<option value="rosa">

Rosa

</option>

<option value="beige">

Beige

</option>

</select>

</div>


<br>


<div class="botones">

<button
onclick="guardarConfiguracion()">

💾 Guardar cambios

</button>


<button
onclick="restablecerConfiguracion()">

🗑 Restablecer

</button>

</div>

</div>
