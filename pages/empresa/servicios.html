<div class="contenido">

<h1>Servicios</h1>

<div class="formulario">

<input
type="text"
id="codigoServicio"
placeholder="Código"
oninput="soloNumeros(this)">

<input
type="text"
id="nombreServicio"
placeholder="Nombre del servicio">

<input
type="text"
id="duracionServicio"
placeholder="Duración (min)"
oninput="soloNumeros(this)">

<input
type="text"
id="precioServicio"
placeholder="Precio"
oninput="soloNumeros(this)">

<select id="categoriaServicio">

<option value="">
Seleccione categoría
</option>

<option>Hidratación</option>
<option>Corte</option>
<option>Tratamiento</option>
<option>Definición</option>

</select>

<textarea
id="descripcionServicio"
placeholder="Descripción">
</textarea>

</div>

<div class="botones">

<button onclick="guardarServicio()">
Guardar
</button>

<button onclick="editarServicio()">
Editar
</button>

<button onclick="eliminarServicio()">
Eliminar
</button>

<button onclick="limpiarServicio()">
Limpiar
</button>

</div>

<div class="tabla-container">

<table id="tablaServicios">

<thead>

<tr>

<th>Código</th>
<th>Servicio</th>
<th>Duración</th>
<th>Precio</th>
<th>Categoría</th>

</tr>

</thead>

</tbody>

</table>
