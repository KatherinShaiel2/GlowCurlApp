<div class="contenido">

<h1>Productos</h1>

<div class="formulario">

<input
type="text"
id="codigoProducto"
placeholder="Código"
oninput="soloNumeros(this)">

<input
type="text"
id="nombreProducto"
placeholder="Nombre producto">

<input
type="text"
id="marcaProducto"
placeholder="Marca">

<input
type="text"
id="cantidadProducto"
placeholder="Cantidad"
oninput="soloNumeros(this)">

<input
type="text"
id="precioProducto"
placeholder="Precio"
oninput="soloNumeros(this)">

<select id="categoriaProducto">

<option value="">
Seleccione categoría
</option>

<option>Shampoo</option>
<option>Acondicionador</option>
<option>Crema</option>
<option>Aceite</option>

</select>

</div>


<div class="botones">

<button onclick="guardarProducto()">
Guardar
</button>

<button onclick="editarProducto()">
Editar
</button>

<button onclick="eliminarProducto()">
Eliminar
</button>

<button onclick="limpiarProducto()">
Limpiar
</button>

</div>


<div class="tabla-container">

<table id="tablaProductos">

<thead>

<tr>

<th>Código</th>
<th>Nombre</th>
<th>Marca</th>
<th>Cantidad</th>
<th>Precio</th>
<th>Categoría</th>

</tr>

</thead>

<tbody>

</tbody>

</table>
